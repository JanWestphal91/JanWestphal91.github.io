<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
            name="description"
            content="Projekt-Detailseite von Jan Westphal mit Beschreibung, Galerie und technischen Infos."
    />
    <title>Projekt - Jan Westphal</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body data-page="project">
<header class="site-header">
    <div class="container nav">
        <a href="index.html#top" class="logo">Jan Westphal</a>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="index.html#about">About me</a></li>
                <li><a href="index.html#contact">Contact / Socials</a></li>

            Cool Mode
        </button>

    <section class="section project-hero">
        <div class="container">
            <a class="back-link" href="index.html#projects">← Zurueck zu Projects</a>

    <section class="section">

            <h2>Galerie</h2>
            <div id="project-gallery" class="project-gallery"></div>

    <section class="section section-alt">
        <div class="container">

            <div id="project-content" class="project-content"></div>
        </div>

<footer class="site-footer">
    <div class="container footer-row">
